name: Desktop builds

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-builds-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            target: mac
            build_args: --mac
          - name: Windows
            os: windows-latest
            target: win
            build_args: --win --x64
          - name: Linux
            os: ubuntu-latest
            target: linux
            build_args: --linux --x64

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web
        working-directory: web
        env:
          VITE_BASE: ./
        run: bun run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Build desktop package
        working-directory: desktop
        run: npm run dist -- ${{ matrix.build_args }} --publish=never

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinite-canvas-${{ matrix.target }}
          path: |
            desktop/release/**
            !desktop/release/*-unpacked/**
          if-no-files-found: error
