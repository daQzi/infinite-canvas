name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  RUST_BACKTRACE: short
  HUSKY: 0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-draft-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      release_body: ${{ steps.release.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        name: Resolve release channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag commit belongs to default branch
        shell: bash
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "${DEFAULT_BRANCH}"

          TAG_COMMIT=$(git rev-list -n 1 "${GITHUB_REF_NAME}")
          if git merge-base --is-ancestor "${TAG_COMMIT}" "origin/${DEFAULT_BRANCH}"; then
            echo "Tag ${GITHUB_REF_NAME} is based on ${DEFAULT_BRANCH}"
          else
            echo "Tag ${GITHUB_REF_NAME} is not based on ${DEFAULT_BRANCH}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify tag matches app version
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          ROOT_VERSION=$(tr -d '[:space:]' < VERSION)

          if [[ "v$APP_VERSION" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Tauri app version v$APP_VERSION"
            exit 1
          fi

          if [[ "$ROOT_VERSION" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION file $ROOT_VERSION"
            exit 1
          fi

      - id: release
        name: Create or reuse draft release
        uses: actions/github-script@v7
        env:
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const { owner, repo } = context.repo;
            const prerelease = process.env.PRERELEASE === "true";
            const releaseName = `无限画布 ${tag}`;

            const { data: tagRef } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${tag}`,
            });

            let commitSha = tagRef.object.sha;
            if (tagRef.object.type === "tag") {
              const { data: annotatedTag } = await github.rest.git.getTag({
                owner,
                repo,
                tag_sha: commitSha,
              });
              if (annotatedTag.object.type !== "commit") {
                core.setFailed(`Tag ${tag} points to ${annotatedTag.object.type}, not a commit.`);
                return;
              }
              commitSha = annotatedTag.object.sha;
            }

            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: commitSha,
            });

            const releaseBody = commit.commit.message?.trim() || `_Release ${tag}._`;
            let release;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              if (!existing.data.draft) {
                core.setFailed(`Release for tag ${tag} already exists and is not a draft.`);
                return;
              }

              release = existing.data;
              if (
                release.prerelease !== prerelease ||
                release.name !== releaseName ||
                (release.body ?? "").trim() !== releaseBody
              ) {
                const updated = await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  name: releaseName,
                  prerelease,
                  body: releaseBody,
                });
                release = updated.data;
              }
              core.info(`Reusing existing draft release #${release.id}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease,
              });
              release = created.data;
              core.info(`Created draft release #${release.id}`);
            }

            core.setOutput("release_id", String(release.id));
            core.setOutput("release_body", releaseBody);

  build-tauri:
    needs: create-draft-release
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            runner: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Windows x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - name: Linux x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles appimage,deb
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: tauri-${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - id: apple_signing
        name: Detect Apple signing secrets
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            printf '::warning::Apple signing secrets are incomplete: %s. macOS artifacts will be unsigned and may be blocked by Gatekeeper.\n' "${missing[*]}"
          fi

      - name: Import Apple Developer ID certificate
        if: contains(matrix.target, 'apple-darwin') && steps.apple_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          keychain_path="$RUNNER_TEMP/infinite-canvas-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_search_list_path="$RUNNER_TEMP/infinite-canvas-keychains.txt"
          original_default_keychain="$(
            security default-keychain -d user \
              | sed -e 's/^[[:space:]]*//' -e 's/^"//' -e 's/"$//'
          )"
          security list-keychains -d user \
            | sed -e 's/^[[:space:]]*//' -e 's/^"//' -e 's/"$//' \
            > "$keychain_search_list_path"

          echo "APPLE_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_PATH=$certificate_path" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_SEARCH_LIST_PATH=$keychain_search_list_path" >> "$GITHUB_ENV"
          echo "APPLE_ORIGINAL_DEFAULT_KEYCHAIN=$original_default_keychain" >> "$GITHUB_ENV"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"

          existing_keychains=()
          while IFS= read -r existing_keychain; do
            if [ -n "$existing_keychain" ]; then
              existing_keychains+=("$existing_keychain")
            fi
          done < "$keychain_search_list_path"

          if [ "${#existing_keychains[@]}" -eq 0 ]; then
            security list-keychains -d user -s "$keychain_path"
          else
            security list-keychains -d user -s "$keychain_path" "${existing_keychains[@]}"
          fi

          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -t 21600 -u "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Resolve Apple Developer ID identity
        if: contains(matrix.target, 'apple-darwin') && steps.apple_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cert_info="$(
            security find-identity -v -p codesigning "$APPLE_KEYCHAIN_PATH" \
              | grep "Developer ID Application" \
              | head -n 1 \
              || true
          )"

          if [ -z "$cert_info" ]; then
            echo "::error::No Developer ID Application signing identity found in imported keychain."
            security find-identity -v -p codesigning "$APPLE_KEYCHAIN_PATH" || true
            exit 1
          fi

          cert_id="$(echo "$cert_info" | awk -F'"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          echo "Using Apple signing identity: $cert_id"

      - name: Build and upload Tauri package
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-draft-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseBody: ${{ needs.create-draft-release.outputs.release_body }}
          releaseDraft: true
          prerelease: ${{ needs.create-draft-release.outputs.prerelease }}
          tauriScript: npx --yes @tauri-apps/cli@2.11.4
          args: ${{ matrix.args }}
          includeUpdaterJson: false
          retryAttempts: 2

      - name: Delete Apple signing keychain
        if: always() && contains(matrix.target, 'apple-darwin') && steps.apple_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          if [ -n "${APPLE_ORIGINAL_DEFAULT_KEYCHAIN:-}" ]; then
            security default-keychain -s "$APPLE_ORIGINAL_DEFAULT_KEYCHAIN" || true
          fi

          if [ -n "${APPLE_KEYCHAIN_SEARCH_LIST_PATH:-}" ] && \
             [ -f "$APPLE_KEYCHAIN_SEARCH_LIST_PATH" ]; then
            restored_keychains=()
            while IFS= read -r restored_keychain; do
              if [ -n "$restored_keychain" ]; then
                restored_keychains+=("$restored_keychain")
              fi
            done < "$APPLE_KEYCHAIN_SEARCH_LIST_PATH"

            if [ "${#restored_keychains[@]}" -ne 0 ]; then
              security list-keychains -d user -s "${restored_keychains[@]}" || true
            fi
          fi

          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$APPLE_KEYCHAIN_PATH" || true
          fi

          for path in \
            "${APPLE_CERTIFICATE_PATH:-}" \
            "${APPLE_KEYCHAIN_SEARCH_LIST_PATH:-}"; do
            if [ -n "$path" ]; then
              rm -f "$path"
            fi
          done

  publish-release:
    needs:
      - create-draft-release
      - build-tauri
    if: ${{ needs.build-tauri.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-draft-release.outputs.release_id }}
          PRERELEASE: ${{ needs.create-draft-release.outputs.prerelease }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const prerelease = process.env.PRERELEASE === "true";

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              draft: false,
              prerelease,
            });

            core.info(`Published release #${releaseId}`);
