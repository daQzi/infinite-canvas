name: Tauri builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tauri-builds-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg
            artifact: macos-arm64
            bundle_path: src-tauri/target/aarch64-apple-darwin/release/bundle
            rust_target: aarch64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            args: --target x86_64-apple-darwin --bundles dmg
            artifact: macos-x64
            bundle_path: src-tauri/target/x86_64-apple-darwin/release/bundle
            rust_target: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            args: --bundles nsis
            artifact: windows
            bundle_path: src-tauri/target/release/bundle
            rust_target: ""
          - name: Linux
            os: ubuntu-latest
            args: --bundles appimage,deb
            artifact: linux
            bundle_path: src-tauri/target/release/bundle
            rust_target: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build Tauri package
        run: npx --yes @tauri-apps/cli@2.11.4 build ${{ matrix.args }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinite-canvas-tauri-${{ matrix.artifact }}
          path: |
            ${{ matrix.bundle_path }}/**/*.dmg
            ${{ matrix.bundle_path }}/**/*.exe
            ${{ matrix.bundle_path }}/**/*.AppImage
            ${{ matrix.bundle_path }}/**/*.deb
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.bundle_path }}/**/*.dmg
            ${{ matrix.bundle_path }}/**/*.exe
            ${{ matrix.bundle_path }}/**/*.AppImage
            ${{ matrix.bundle_path }}/**/*.deb
